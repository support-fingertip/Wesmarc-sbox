<template>
    <div class="site-container">
        <!-- Header -->
        <header class="site-header">
            <div class="header-content">
                <img src={wesmarkLogoUrl} alt="Wesmarc Logo" class="header-logo" onerror={handleLogoError} />
                <div>
                    <h1 class="header-title">Wesmarc Customer Support</h1>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="site-body">
            <template if:false={isSubmitted}>
                <div class="form-container">
                    <h2 class="form-heading">Report an Issue</h2>
                    <p class="form-subheading">Please fill in the details below and we will get back to you shortly.</p>
                    <hr class="form-divider"/>
                    <div class="form-fields">
                        <lightning-input
                            label="Name"
                            value={customerName}
                            data-field="customerName"
                            onchange={handleInputChange}
                            required
                            placeholder="Enter your full name"
                            class="input-decor"
                        ></lightning-input>
                        <lightning-input
                            label="Mobile Number"
                            type="tel"
                            value={mobileNumber}
                            data-field="mobileNumber"
                            onchange={handleInputChange}
                            required
                            pattern="[6-9][0-9]{9}"
                            max-length="10"
                            message-when-pattern-mismatch="Please enter a valid 10-digit mobile number starting with 6, 7, 8, or 9"
                            placeholder="Enter 10-digit mobile number"
                            class="input-decor"
                        ></lightning-input>
                        <lightning-textarea
                            label="Address"
                            value={address}
                            data-field="address"
                            onchange={handleInputChange}
                            required
                            placeholder="Enter your complete address"
                            class="input-decor compact-textarea"
                        ></lightning-textarea>
                        <lightning-textarea
                            label="Issue Details"
                            value={issueDetails}
                            data-field="issueDetails"
                            onchange={handleInputChange}
                            required
                            placeholder="Describe the issue you are facing"
                            class="input-decor compact-textarea"
                        ></lightning-textarea>
                        <div class="button-container">
                            <lightning-button
                                variant="brand"
                                label="Submit"
                                onclick={handleSubmit}
                                disabled={isSubmitting}
                                class="submit-btn"
                            ></lightning-button>
                            <template if:true={isLoading}>
                                <lightning-spinner alternative-text="Submitting..." size="small"></lightning-spinner>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
            <template if:true={isSubmitted}>
                <div class="success-container">
                    <div class="success-icon">&#10004;</div>
                    <h2 class="success-heading">Thank You!</h2>
                    <p class="success-message">Your issue is submitted. Our team will contact you shortly.</p>
                    <p class="success-reference">Case Reference: <strong>{caseNumber}</strong></p>
                    <lightning-button
                        variant="brand"
                        label="Submit Another Issue"
                        onclick={handleReset}
                        class="slds-m-top_large"
                    ></lightning-button>
                </div>
            </template>
        </main>

        <!-- Footer: Black background with logo and details -->
        <footer class="site-footer">
            <div class="footer-content">
                <img src={wesmarkLogoUrl} alt="Wesmarc Logo" class="footer-logo" onerror={handleLogoError} />
                <div class="footer-details">
                    <p class="footer-text">Wesmarc Industries Pvt. Ltd.</p>
                    <p class="footer-contact">
                        Need help? Email us at
                        <a href="mailto:support@wesmarc.com">support@wesmarc.com</a>
                    </p>
                    <p class="footer-text">&copy; 2026 Wesmarc. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </div>
</template>
